<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <title>Mon Portfolio</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <style>
    body {
      margin: 0;
      font-family: Arial, sans-serif;
      background: linear-gradient(135deg, #0f172a, #1e293b);
      color: white;
    }

    header {
      text-align: center;
      padding: 80px 20px;
    }

    h1 {
      font-size: 3em;
    }

    .section {
      padding: 50px 20px;
      max-width: 900px;
      margin: auto;
    }

    .skills {
      display: flex;
      flex-wrap: wrap;
      gap: 10px;
    }

    .skill {
      background: #38bdf8;
      padding: 10px 15px;
      border-radius: 20px;
      color: black;
      font-weight: bold;
    }

    .card {
      background: #1e293b;
      padding: 20px;
      margin-top: 20px;
      border-radius: 10px;
    }

    footer {
      text-align: center;
      padding: 30px;
      opacity: 0.6;
    }
  </style>
</head>

<body>

<header>
  <h1>Ton Nom</h1>
  <p>Électricien / Technicien / Ton métier</p>
</header>

<div class="section">
  <h2>💡 Compétences</h2>
  <div class="skills">
    <div class="skill">Électricité</div>
    <div class="skill">Domotique</div>
    <div class="skill">Dépannage</div>
    <div class="skill">PAC</div>
  </div>
</div>

<div class="section">
  <h2>🛠️ Projets</h2>

  <div class="card">
    <h3>Installation électrique maison</h3>
    <p>Réalisation complète d’un tableau + réseau.</p>
  </div>

  <div class="card">
    <h3>Installation PAC</h3>
    <p>Mise en place et raccordement.</p>
  </div>
</div>

<div class="section">
  <h2>📞 Contact</h2>
  <p>Email : tonemail@email.com</p>
</div>

<footer>
  © 2026 - Ton Nom
</footer>

</body>
</html>
